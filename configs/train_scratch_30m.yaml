# Pretrain TinyCode ~30M decoder on the full Python subset of GitHub code
model:
  output_dir: outputs/tinycode-30m
  tokenizer: gpt2

dataset:
  name: codeparrot/github-code
  languages:
    - Python
  split: train
  text_column: code
  max_samples: null  # full Python subset (~7.2M files)
  cache_dir: outputs/tinycode-30m/dataset-cache  # reuse after first preprocess

training:
  block_size: 512
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4  # effective batch size = 16
  num_train_epochs: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  logging_steps: 100
  save_steps: 5000
  max_steps: null
  fp16: true
  preprocessing_num_proc: 4
  seed: 42
