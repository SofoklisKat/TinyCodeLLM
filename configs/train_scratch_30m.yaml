# Pretrain TinyCode ~30M on full Python GitHub code (streaming, low disk use)
# Good when you have ~70-100 GB free. Avoids ~52 GB download + large dataset-cache.
model:
  output_dir: outputs/tinycode-30m
  tokenizer: gpt2

dataset:
  name: codeparrot/github-code
  trust_remote_code: true
  streaming: true
  languages:
    - Python
  split: train
  text_column: code
  max_samples: null  # full stream; set a number to cap examples

training:
  block_size: 512
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  logging_steps: 100
  save_steps: 5000
  max_steps: null
  fp16: true
  seed: 42
