# TinyCode ~15M — balance of quality and small footprint (4-5GB GPUs)
model:
  size: 15m
  output_dir: outputs/tinycode-15m
  tokenizer: gpt2

dataset:
  name: codeparrot/github-code
  trust_remote_code: true
  streaming: true
  languages:
    - Python
  split: train
  text_column: code
  max_samples: null

training:
  block_size: 512
  per_device_train_batch_size: 6
  gradient_accumulation_steps: 2  # effective batch = 12
  num_train_epochs: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  logging_steps: 100
  save_steps: 5000
  max_steps: null
  fp16: true
  seed: 42
