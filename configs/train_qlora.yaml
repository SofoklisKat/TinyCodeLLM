# QLoRA fine-tune for TinyCodeLLM (tuned for 8GB VRAM, e.g. RTX 2080)
model:
  name: Qwen/Qwen2.5-Coder-0.5B-Instruct
  trust_remote_code: false

dataset:
  name: iamtarun/python_code_instructions_18k_alpaca
  split: train
  max_samples: 18000  # set to 500-2000 for a quick smoke test
  validation_split: 0.05

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: outputs/tinycode-qlora
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4  # effective batch size = 8
  learning_rate: 2.0e-4
  max_seq_length: 2048
  warmup_ratio: 0.03
  logging_steps: 10
  eval_steps: 200
  save_steps: 400
  save_total_limit: 2
  bf16: false
  fp16: false  # RTX 2080 (Turing): no bf16 AMP; fp32 LoRA training avoids GradScaler crash
  gradient_checkpointing: false  # 0.5B fits on 8GB; disable for faster training
  optim: paged_adamw_8bit
  seed: 42
